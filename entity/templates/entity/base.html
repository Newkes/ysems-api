<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>YSEMS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }

        nav a {
            margin-right: 1rem;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 0.5rem;
            text-align: left;
        }

        .messages {
            margin: 1rem 0;
        }

            .messages li {
                margin-bottom: 0.5rem;
            }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'entity:home' %}">Home</a>
        <a href="{% url 'entity:web-entity-list' %}">Entities</a>
        <a href="{% url 'entity:web-entity-create' %}">Create Entity</a>
        <a href="/api/entities/">API</a>


        {% if user.is_authenticated %}
        <form method="post" action="{% url 'entity:logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'entity:login' %}">Login</a>
        <a href="{% url 'entity:signup' %}">Sign Up</a>
        {% endif %}
    </nav>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
